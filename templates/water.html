<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Water Intake Calculator</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='dashboard.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='water-style.css') }}"
    />
    <style>
      .nav-row {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin: 20px;
      }
      .action-btn, .next-btn {
        padding: 8px 12px;
        font-size: 14px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
        text-decoration: none;
        display: inline-block;
        font-weight: 500;
      }
      .action-btn {
        background: #007bff;
        color: white;
      }
      .action-btn:hover {
        background: #0056b3;
      }
      .next-btn {
        background: #28a745;
        color: white;
      }
      .next-btn:hover {
        background: #218838;
      }
    </style>
  </head>
  <body>
    <header class="navbar">
      <nav>
        <a href="{{ url_for('dashboard_bp.dashboard') }}" class="logo active">
          Fit Track Pro
        </a>
        <a href="{{ url_for('main_bp.home') }}" class="logout-btn">Logout</a>
      </nav>
    </header>

    <!-- Navigation Buttons Row -->
    <div class="nav-row">
      <a href="{{ url_for('dashboard_bp.dashboard') }}">
        <button class="action-btn">Back to Dashboard</button>
      </a>
      <a href="{{ url_for('exercise_bp.exercise_tracker') }}">
        <button class="next-btn">Next: Activity Tracker &rarr;</button>
      </a>
    </div>

    <div class="bmi-container">
      <div class="bmi-content">
        <!-- Input Form -->
        <form method="POST">
          <div class="bmi-card">
            <div class="input-row">
              <div class="input-field">
                <label>Age</label>
                <input
                  type="number"
                  name="age"
                  placeholder="25"
                  min="1"
                  required
                />
              </div>
              <div class="input-field">
                <label>Weight (kg)</label>
                <input
                  type="number"
                  name="weight"
                  placeholder="70"
                  min="1"
                  required
                />
              </div>
            </div>

            <div class="input-field">
              <label>Height (cm)</label>
              <input
                type="number"
                name="height"
                placeholder="170"
                min="50"
                required
              />
            </div>

            <div class="input-field">
              <label>Activity Level</label>
              <select name="activity" required>
                <option value="0">Sedentary (Office work)</option>
                <option value="0.5">Lightly Active (Walking)</option>
                <option value="1">Highly Active (Gym / Sports)</option>
              </select>
            </div>

            <div class="input-field">
              <label>Current Temperature</label>
              <select name="temperature" required>
                <option value="0">Cool / Normal (&lt; 25°C)</option>
                <option value="0.4">Warm (25–35°C)</option>
                <option value="0.8">Hot (&gt; 35°C)</option>
              </select>
            </div>

            <div class="input-field">
              <label>Other Drinks (Tea/Juice) in ml</label>
              <input
                type="number"
                name="additional"
                placeholder="500"
                min="0"
              />
            </div>

            <button class="calculate-btn" type="submit">
              Calculate Target
            </button>
          </div>
        </form>

        <!-- Result Card -->
        {% if result %}
        <div class="bmi-card result-card">
          <div class="bmi-value-box">
            <h2>{{ result }} L</h2>
            <span>Water / Day</span>
          </div>
          <div class="status-indicator">
            <p>Target: {{ glasses }} glasses (250 ml each)</p>
          </div>
          <div class="bmi-details">
            <p>{{ advice }}</p>
          </div>
        </div>
        {% endif %} 
        {% if message %}
        <p style="color: red; margin-top: 10px">{{ message }}</p>
        {% endif %}
      </div>
    </div>
  </body>
</html>
