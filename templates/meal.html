<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Healthy Meal Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='meal-style.css') }}" />
    <style>
      .nav-row {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin: 15px 25px;
      }
      .action-btn, .next-btn {
        padding: 6px 12px;
        font-size: 14px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
        text-decoration: none;
        display: inline-block;
        font-weight: 500;
      }
      .action-btn {
        background: #007bff;
        color: white;
      }
      .action-btn:hover {
        background: #0056b3;
      }
      .next-btn {
        background: #28a745;
        color: white;
      }
      .next-btn:hover {
        background: #218838;
      }
    </style>
  </head>
  
  <body>
    <header class="navbar">
      <nav>
        <a href="{{ url_for('dashboard_bp.dashboard') }}" class="logo active">
          Fit Track Pro
        </a>

        <a href="{{ url_for('main_bp.home') }}" class="logout-btn">Logout</a>
      </nav>
    </header>

    <!-- Navigation Buttons Row -->
    <div class="nav-row">
      <a href="{{ url_for('dashboard_bp.dashboard') }}">
        <button class="action-btn">Back to Dashboard</button>
      </a>
      <a href="{{ url_for('final_report_bp.final_report') }}">
        <button class="next-btn">Next: Health Report &rarr;</button>
      </a>
    </div>

    <div class="bmi-container">
      <header class="bmi-header">
        <div class="header-text">
          <h1>Meal Planner 🍱</h1>
          <p>Plan your daily nutrition and healthy diet</p>
        </div>
      </header>

      <div class="bmi-content">
        <!-- Meal Selection Card -->
        <div class="bmi-card">
          <form method="POST">
            <div class="input-field">
              <label>Breakfast 🍳</label>
              <select name="breakfast">
                <option value="Oats & Fruits" {% if breakfast=='Oats & Fruits' %}selected{% endif %}>Oats & Fruits</option>
                <option value="Eggs & Toast" {% if breakfast=='Eggs & Toast' %}selected{% endif %}>Eggs & Toast</option>
                <option value="Smoothie Bowl" {% if breakfast=='Smoothie Bowl' %}selected{% endif %}>Smoothie Bowl</option>
              </select>
            </div>

            <div class="input-field">
              <label>Lunch 🥗</label>
              <select name="lunch">
                <option value="Grilled Chicken Salad" {% if lunch=='Grilled Chicken Salad' %}selected{% endif %}>Grilled Chicken Salad</option>
                <option value="Dal & Brown Rice" {% if lunch=='Dal & Brown Rice' %}selected{% endif %}>Dal & Brown Rice</option>
                <option value="Vegetable Wrap" {% if lunch=='Vegetable Wrap' %}selected{% endif %}>Vegetable Wrap</option>
              </select>
            </div>

            <div class="input-field">
              <label>Dinner 🍽️</label>
              <select name="dinner">
                <option value="Baked Fish & Veggies" {% if dinner=='Baked Fish & Veggies' %}selected{% endif %}>Baked Fish & Veggies</option>
                <option value="Clear Soup & Salad" {% if dinner=='Clear Soup & Salad' %}selected{% endif %}>Clear Soup & Salad</option>
                <option value="Quinoa & Chickpeas" {% if dinner=='Quinoa & Chickpeas' %}selected{% endif %}>Quinoa & Chickpeas</option>
              </select>
            </div>

            <button class="calculate-btn" type="submit">
              Save My Plan
            </button>
          </form>
        </div>

        <!-- Result Card -->
        <div class="bmi-card result-card">
          <div class="bmi-value-box">
            <h2>{{ meal_status }}</h2>
            <span>Meal Status</span>
          </div>

          <div class="bmi-details">
            <p>{{ meal_output|safe }}</p>
          </div>

          <div style="margin-top: 20px">
            <img
              src="https://images.unsplash.com/photo-1547592166-23ac45744acd?auto=compress&cs=tinysrgb&w=400"
              alt="Meal Planning"
              style="width: 100%; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);"
            />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
